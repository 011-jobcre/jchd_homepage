{% load static %}
<!-- Banner -->
<section class="relative w-full h-64 md:h-80 overflow-hidden">
    {% if banner_image %}
        <img src="{{ banner_image.url }}"
             alt="{{ banner_title }}"
             class="absolute inset-0 w-full h-full object-cover">
    {% else %}
        <img src="{% static 'img/bg_default.jpg' %}"
             alt="{{ banner_title }}"
             class="absolute inset-0 w-full h-full object-cover">
    {% endif %}
    <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/30 to-black/20"></div>
    <div class="relative z-10 flex flex-col items-center justify-center h-full text-center px-4">
        <h1 class="text-white text-3xl md:text-5xl font-bold tracking-widest uppercase">{{ banner_title }}</h1>
        <div class="w-12 h-1 bg-primary mt-4"></div>
    </div>
</section>
<!-- Breadcrumb -->
<nav class="bg-gray-50 border-b border-gray-200 py-3"
     aria-label="Breadcrumb">
    <div class="max-w-6xl mx-auto px-4">
        <ol class="flex items-center space-x-2 text-sm text-gray-500">
            <li class="flex items-center">
                <a href="{% url 'home' %}" class="hover:text-primary transition-colors"><i class="fa-regular fa-house pr-2"></i>{{ menu_items.home.name }}</a>
            </li>
            {% for crumb in breadcrumbs %}
                <li class="flex items-center">
                    <span class="mx-2 text-gray-300">/</span>
                    {% if not forloop.last %}
                        <a href="{{ crumb.url }}" class="hover:text-primary transition-colors">{{ crumb.name }}</a>
                    {% else %}
                        <span class="text-gray-900 font-medium truncate max-w-[200px] md:max-w-none"
                              aria-current="page">{{ crumb.name }}</span>
                    {% endif %}
                </li>
            {% endfor %}
        </ol>
    </div>
</nav>
